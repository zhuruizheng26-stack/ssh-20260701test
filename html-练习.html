<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <title>美化网页的示例</title>
    <style>
      body {
        background-color: #f5f5f5;
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      h1 {
        color: #333;
      }
      p {
        color: #666;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <h1>欢迎来到我的网站</h1>
    <p>这是一个使用CSS美化的网页示例。</p>
  </body>
</html>
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <title>动态网页示例</title>
  </head>
  <body>
    <button id="myButton">点击我</button>
    <script>
      document.getElementById('myButton').addEventListener('click', function() {
        alert('按钮被点击了！');
      });
    </script>
  </body>
</html>
